<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pages of Xiangbo</title>
  <style>
    :root{
      --bg1:#0b1220;
      --bg2:#0f1b33;
      --card:#111b31cc;
      --stroke:#23304d;
      --text:#e6edf7;
      --muted:#9fb0cc;
      --link:#7dd3fc;
      --badge:#1f2a44;
      --badgeText:#cfe2ff;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 18px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 600px at 20% 0%, rgba(125,211,252,.18), transparent 60%),
        radial-gradient(900px 600px at 90% 10%, rgba(167,139,250,.18), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    .wrap{
      max-width: 1040px;
      margin: 0 auto;
      padding: 36px 18px 54px;
    }
    header{
      display:flex;
      gap:14px;
      align-items:flex-end;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom: 18px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    h1{
      margin:0;
      font-size: 26px;
      letter-spacing:.2px;
    }
    .sub{
      color:var(--muted);
      font-size: 13px;
      line-height:1.4;
    }
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--stroke);
      background: rgba(17,27,49,.55);
      padding: 8px 10px;
      border-radius: 999px;
      backdrop-filter: blur(6px);
    }
    .card{
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      backdrop-filter: blur(10px);
    }
    .tips{
      margin: 0 0 14px 0;
      color: var(--muted);
      font-size: 13px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .tips code{
      background: rgba(31,42,68,.75);
      border: 1px solid rgba(35,48,77,.9);
      padding: 2px 6px;
      border-radius: 8px;
      color: var(--badgeText);
    }

    /* tree */
    .tree{
      list-style:none;
      margin:0;
      padding-left: 14px;
    }
    .node{
      margin: 6px 0;
    }
    details > summary{
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid transparent;
    }
    details > summary:hover{
      border-color: rgba(125,211,252,.22);
      background: rgba(125,211,252,.06);
    }
    details > summary::-webkit-details-marker{ display:none; }
    .icon{ width: 20px; text-align:center; }
    .name{ font-weight: 600; color: var(--text); }
    .hint{ color: var(--muted); font-weight: 500; }

    .fileLink{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid transparent;
      text-decoration:none;
      color: var(--text);
    }
    .fileLink:hover{
      border-color: rgba(125,211,252,.22);
      background: rgba(125,211,252,.06);
    }
    .fileLink .name{
      font-weight: 560;
      color: var(--link);
    }
    .badge{
      margin-left:auto;
      font-size:11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(31,42,68,.85);
      border: 1px solid rgba(35,48,77,.9);
      color: var(--badgeText);
      letter-spacing:.3px;
    }
    footer{
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>Pages of Xiangbo</h1>
        <div class="sub">Xiangbo的文件页面分享站。网址为：https://page.xiangbo.net/</div>
      </div>
      <div class="pill">Generated at 2026-06-02T04:25:57.529Z</div>
    </header>

    <div class="card">
      <div class="tips">
        <span>提示：可以点击目录名称或文件名称。</span>
       
      </div>
      <ul class="tree">
<li class="node dir">
  <details open>
    <summary>
      <span class="icon">📁</span>
      <span class="name">ai</span>
      <span class="hint">/</span>
    </summary>
    <ul class="tree">
<li class="node file">
  <a class="fileLink" href="./ai/index.html">
    <span class="icon">📄</span>
    <span class="name">ai/index.html</span>
    <span class="badge">HTML</span>
  </a>
</li>
</ul>

  </details>
</li>
<li class="node file">
  <a class="fileLink" href="./README.md">
    <span class="icon">📄</span>
    <span class="name">README.md</span>
    <span class="badge">MD</span>
  </a>
</li>
</ul>

      <footer>© Xiangbo • Served by Cloudflare Pages</footer>
    </div>
  </div>
</body>
</html>
